<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a4ea3" />
  <title>JSCCB · 信用卡办理</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="stylesheet" href="assets/css/style.css?v=2" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">JSCCB</span>
      <span class="topbar-title">信用卡办理</span>
    </div>
    <nav class="topnav">
      <button class="nav-btn active" data-view="home">选卡</button>
      <button class="nav-btn" data-view="progress">进度</button>
    </nav>
  </header>

  <main class="container">
    <!-- 选卡 -->
    <section id="view-home" class="view">
      <h2 class="sec-title">为您推荐</h2>
      <div id="card-list" class="card-list"></div>
    </section>

    <!-- 申请 -->
    <section id="view-apply" class="view hidden">
      <div class="steps">
        <div class="step active" data-step="1">1 身份信息</div>
        <div class="step" data-step="2">2 资料填写</div>
        <div class="step" data-step="3">3 确认提交</div>
      </div>

      <div id="apply-card" class="apply-card-preview"></div>

      <!-- 步骤1 G6 -->
      <form id="form-step1" class="form-step">
        <h3>增值服务（可选）</h3>
        <div class="checks" id="addon-checks"></div>

        <h3>身份信息</h3>
        <div class="field"><label>姓名 *</label><input name="name" placeholder="与身份证一致" required /></div>
        <div class="field"><label>姓名拼音 *</label><input name="nameEn" placeholder="如 ZHANG SAN" required /></div>
        <div class="field"><label>身份证号 *</label><input name="idno" placeholder="18 位身份证号" maxlength="18" required /></div>
        <div class="field sms">
          <label>手机号 *</label>
          <div class="sms-row">
            <input name="phone" placeholder="本人实名手机号" maxlength="11" required />
            <button type="button" id="code-btn" class="btn-ghost">获取验证码</button>
          </div>
        </div>
        <div class="field"><label>短信验证码 *</label><input name="code" placeholder="6 位数字" maxlength="6" required /></div>

        <label class="agree"><input type="checkbox" name="agree" required /> 我已阅读并同意《信用卡领用协议》《个人信息授权书》</label>
        <button type="button" class="btn-primary next-btn">下一步</button>
      </form>

      <!-- 步骤2 H7 -->
      <form id="form-step2" class="form-step hidden">
        <h3>职业与收入</h3>
        <div class="field"><label>学历</label>
          <select name="edu"><option>本科</option><option>硕士及以上</option><option>大专</option><option>高中及以下</option></select>
        </div>
        <div class="field"><label>在职情况</label>
          <select name="employ"><option>在职</option><option>自由职业</option><option>企业主</option><option>退休</option><option>学生</option></select>
        </div>
        <div class="field"><label>单位全称</label><input name="company" placeholder="工作单位全称" /></div>
        <div class="field"><label>职业</label><input name="occupation" placeholder="如 工程师" /></div>
        <div class="field"><label>婚姻状况</label>
          <select name="marry"><option>已婚</option><option>未婚</option><option>离异</option></select>
        </div>
        <div class="field"><label>年收入</label>
          <select name="income"><option>10万以下</option><option>10-20万</option><option>20-50万</option><option>50万以上</option></select>
        </div>
        <div class="field"><label>联系方式（备用）</label><input name="contact" placeholder="其他联系电话" /></div>

        <h3>地址信息</h3>
        <div class="field"><label>单位地址</label><input name="companyAddr" placeholder="省/市/区 + 详细地址" /></div>
        <div class="field"><label>住宅地址</label><input name="homeAddr" placeholder="省/市/区 + 详细地址" /></div>
        <div class="field"><label>寄送地址</label>
          <select name="mailAddr"><option>同住宅地址</option><option>同单位地址</option><option>其他</option></select>
        </div>
        <div class="field"><label>邮编</label><input name="zip" placeholder="6 位邮编" maxlength="6" /></div>
        <div class="field"><label>电子邮箱</label><input name="email" type="email" placeholder="用于电子账单" /></div>

        <h3>直系亲属联系人</h3>
        <div class="field"><label>联系人姓名</label><input name="kinName" placeholder="如 张三" /></div>
        <div class="field"><label>关系</label>
          <select name="kinRel"><option>父母</option><option>配偶</option><option>子女</option><option>兄弟姐妹</option></select>
        </div>
        <div class="field"><label>联系人电话</label><input name="kinPhone" placeholder="11 位手机号" maxlength="11" /></div>

        <div class="form-actions">
          <button type="button" class="btn-ghost prev-btn">上一步</button>
          <button type="button" class="btn-primary next-btn2">下一步</button>
        </div>
      </form>

      <!-- 步骤3 确认 -->
      <form id="form-step3" class="form-step hidden">
        <h3>确认申请信息</h3>
        <div id="review" class="review"></div>
        <div class="form-actions">
          <button type="button" class="btn-ghost prev-btn2">上一步</button>
          <button type="button" class="btn-primary submit-btn">提交申请</button>
        </div>
      </form>

      <!-- 完成 -->
      <div id="apply-done" class="apply-done hidden">
        <div class="done-icon">✓</div>
        <h3>申请已提交</h3>
        <p>申请编号：<b id="done-no"></b></p>
        <p class="muted" id="done-status">状态：待审核</p>
        <button class="btn-primary" id="done-back">返回选卡</button>
      </div>
    </section>

    <!-- 进度 -->
    <section id="view-progress" class="view hidden">
      <h2 class="sec-title">申请进度</h2>
      <div class="field"><label>查询（身份证号 / 手机号 / 申请编号）</label><input id="q-input" placeholder="输入任一信息" /></div>
      <button class="btn-primary" id="q-btn">查询</button>
      <div id="q-result" class="q-result"></div>
    </section>
  </main>

  <script src="assets/js/app.js?v=2"></script>
</body>
</html>
